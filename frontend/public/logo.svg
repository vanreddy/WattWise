<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 95" width="340" height="95">
  <defs>
    <linearGradient id="greenArc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EAD28"/>
      <stop offset="100%" stop-color="#A3D94A"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="340" height="95" rx="10" fill="#0D1117"/>

  <!-- Full arc track — dark slate -->
  <path d="M 23.4,68.5 A 33,33 0 1 1 80.6,68.5"
        fill="none" stroke="#1C2A38" stroke-width="8" stroke-linecap="round"/>

  <!-- Filled arc — lime green, 80% -->
  <path d="M 23.4,68.5 A 33,33 0 1 1 83.4,41.8"
        fill="none" stroke="url(#greenArc)" stroke-width="8" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <polygon points="55,37 45,55 52,55 48,67 59,49 52,49"
           fill="#F5B700" filter="url(#glow)"/>

  <!-- Wordmark: "Watt" in bolt-yellow, "Wise" in lime green -->
  <text font-family="'Segoe UI', Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="800" y="56">
    <tspan x="110" fill="#FFFFFF">Watt</tspan><tspan fill="#86C840">Wise</tspan>
  </text>

  <!-- Tagline -->
  <text x="111" y="76"
        font-family="'Segoe UI', Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400" fill="#3D5468" letter-spacing="2.8">
    SOLAR ENERGY OPTIMIZER
  </text>
</svg>
