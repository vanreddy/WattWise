<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="greenArc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EAD28"/>
      <stop offset="100%" stop-color="#A3D94A"/>
    </linearGradient>
    <filter id="boltGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" fill="#0D1117"/>

  <!-- Full arc track — dark slate -->
  <path d="M 23.2,68.5 A 31,31 0 1 1 76.8,68.5"
        fill="none" stroke="#1C2A38" stroke-width="10" stroke-linecap="round"/>

  <!-- Filled arc — lime green, 80% -->
  <path d="M 23.2,68.5 A 31,31 0 1 1 79.5,43.4"
        fill="none" stroke="url(#greenArc)" stroke-width="10" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <polygon points="53,34 42,54 51,54 46,68 59,48 50,48"
           fill="#F5B700" filter="url(#boltGlow)"/>
</svg>
